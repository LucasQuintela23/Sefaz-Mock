name: smoke-local-batches

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        batch:
          - name: lote-1
            ufs: AC,AL,AP,AM,BA,CE,DF
          - name: lote-2
            ufs: ES,GO,MA,MT,MS,MG,PA
          - name: lote-3
            ufs: PB,PR,PE,PI,RJ,RN,RS
          - name: lote-4
            ufs: RO,RR,SC,SP,SE,TO
    name: smoke-${{ matrix.batch.name }}
    env:
      BATCH_NAME: ${{ matrix.batch.name }}
      TEST_UFS: ${{ matrix.batch.ufs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Generate matrix data
        run: npm run matrix:generate

      - name: Generate batch summary
        run: npm run batch:summary

      - name: Run smoke tests (batch)
        run: npm run test:smoke:local

      - name: Upload batch artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-${{ matrix.batch.name }}-artifacts
          path: |
            artifacts/
            playwright-report/
            test-results/
          if-no-files-found: warn
